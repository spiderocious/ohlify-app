name: ohlify
description: Ohlify mobile app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Routing
  go_router: ^15.1.1

  # HTTP client
  dio: ^5.7.0

  # Immutable models + JSON serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Secure token storage
  flutter_secure_storage: ^9.2.4

  # Environment config
  flutter_dotenv: ^5.2.1

  # Fonts (Quicksand via google_fonts)
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  mockito: ^5.4.5

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/common/
    - assets/logos/

  fonts:
    - family: MonaSans
      fonts:
        - asset: assets/fonts/MonaSans-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/MonaSans-ExtraLightItalic.ttf
          weight: 200
          style: italic
        - asset: assets/fonts/MonaSans-Light.ttf
          weight: 300
        - asset: assets/fonts/MonaSans-LightItalic.ttf
          weight: 300
          style: italic
        - asset: assets/fonts/MonaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/MonaSans-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/MonaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/MonaSans-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/MonaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/MonaSans-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/MonaSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/MonaSans-BoldItalic.ttf
          weight: 700
          style: italic
        - asset: assets/fonts/MonaSans-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/MonaSans-ExtraBoldItalic.ttf
          weight: 800
          style: italic
        - asset: assets/fonts/MonaSans-Black.ttf
          weight: 900
        - asset: assets/fonts/MonaSans-BlackItalic.ttf
          weight: 900
          style: italic
